<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Statistics - Ubumwe Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="main-header">
            <div class="logo-container">
                <img src="healthcare-logo.svg" alt="Logo" class="logo">
                <h1>UBUMWE CLINIC - REPORTS</h1>
            </div>
        </header>


        <div class="main-layout">
    <aside class="sidebar">
        <h3>Menu</h3>
        <ul>
        <li><a href="index.html" class="menu-link">Home</a></li>
        <li><a href="Dashboard.html" class="menu-link">Dashboard</a></li>
        <li><a href="registration.html" class="menu-link">Patient Registration</a></li>
        <li><a href="management.html" class="menu-link">Patient Management</a></li>
        <li><a href="appointment.html" class="menu-link">Appointment</a></li>
        <li class="active"><a href="report.html" class="menu-link">Reports</a></li>
        <li><a href="setting.html" class="menu-link">Settings</a></li>
    </ul>
    </aside>

    <main class="content-area">
                <div class="filter-row">
                    <div class="date-input">
                        <label>From Date</label>
                        <input type="date">
                    </div>
                    <div class="date-input">
                        <label>To Date</label>
                        <input type="date">
                    </div>
                    <button class="generate-btn">Generate</button>
                </div>

                <div class="report-stats">
                    <div class="stat-box green-box">
                        <p>Total Patients</p>
                        <h2>103</h2>
                    </div>
                    <div class="stat-box blue-box">
                        <p>Appointments</p>
                        <h2>58</h2>
                    </div>
                    <div class="stat-box brown-box">
                        <p>Pending</p>
                        <h2>12</h2>
                    </div>
                </div>

                <div class="chart-container">
                    <h3>Monthly Activity Chart</h3>
                    <div class="bar-chart">
                        <div class="bar" style="height: 30%;"></div>
                        <div class="bar" style="height: 50%;"></div>
                        <div class="bar" style="height: 80%;"></div>
                        <div class="bar" style="height: 45%;"></div>
                        <div class="bar" style="height: 90%;"></div>
                        <div class="bar" style="height: 60%;"></div>
                    </div>
                </div>

                <div class="report-footer">
                    Reports Ready for print/Export
                </div>
            </main>
        </div>
    </div>
</body>
</html>
