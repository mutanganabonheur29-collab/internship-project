<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - Ubumwe Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="main-header">
            <div class="logo-container">
                <img src="healthcare-logo.svg" alt="Logo" class="logo">
                <h1>UBUMWE CLINIC - SETTINGS</h1>
            </div>
        </header>


      <div class="main-layout">
    <aside class="sidebar">
        <h3>Menu</h3>
        <ul>
        <li><a href="index.html" class="menu-link">Home</a></li>
        <li><a href="Dashboard.html" class="menu-link">Dashboard</a></li>
        <li><a href="registration.html" class="menu-link">Patient Registration</a></li>
        <li><a href="management.html" class="menu-link">Patient Management</a></li>
        <li><a href="appointment.html" class="menu-link">Appointment</a></li>
        <li><a href="report.html" class="menu-link">Reports</a></li>
        <li class="active"><a href="setting.html" class="menu-link">Settings</a></li>
    </ul>
    </aside>

    <main class="content-area">
                <div class="settings-card">
                    <h2>Configuration Panel</h2>
                    
                    <div class="settings-grid">
                        <div class="full-row">
                            <label>Click name:</label>
                            <input type="text" value="Hope Health Center">
                        </div>

                        <div class="setting-item">
                            <label>Language:</label>
                            <select>
                                <option>English</option>
                                <option>Kinyarwanda</option>
                                <option>French</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Printer:</label>
                            <select>
                                <option>Default Printer</option>
                                <option>HP LaserJet 400</option>
                            </select>
                        </div>

                        <div class="setting-item">
                            <label>Auto Backup:</label>
                            <select>
                                <option>Enable</option>
                                <option>Disable</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Offline Mode:</label>
                            <select>
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="blue-btn" id="reset-btn">Reset</button>
                        <button class="blue-btn" id="save-btn">Save</button>
                        <button class="blue-btn" id="print-btn">Print</button>
                    </div>
                </div>

                <div class="settings-footer">
                    System Ready > Offline System
                </div>
            </main>
        </div>
    </div>

    <script>
        // Reset button functionality
        document.getElementById('reset-btn').addEventListener('click', function() {
            if (confirm('Are you sure you want to reset all settings to default?')) {
                // Reset all form fields to default values
                document.querySelector('input[type="text"]').value = 'Ubumwe Clinic';
                document.querySelector('select').selectedIndex = 0;
                
                // Reset all select elements to first option
                document.querySelectorAll('select').forEach(select => {
                    select.selectedIndex = 0;
                });
                
                alert('Settings have been reset to default values!');
            }
        });

        // Save button functionality
        document.getElementById('save-btn').addEventListener('click', function() {
            // Get all current settings
            const clinicName = document.querySelector('input[type="text"]').value;
            const language = document.querySelectorAll('select')[0].value;
            const printer = document.querySelectorAll('select')[1].value;
            const backup = document.querySelectorAll('select')[2].value;
            const offlineMode = document.querySelectorAll('select')[3].value;
            
            // Here you would normally save to localStorage or server
            console.log('Saving settings:', {
                clinicName,
                language,
                printer,
                backup,
                offlineMode
            });
            
            alert('Settings have been saved successfully!');
        });

        // Print button functionality
        document.getElementById('print-btn').addEventListener('click', function() {
            // Print the settings page
            window.print();
        });
    </script>
</body>
</html>
