<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - Ubumwe Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="main-header">
            <div class="logo-container">
                <img src="healthcare-logo.svg" alt="Logo" class="logo">
                <h1>UBUMWE CLINIC - PATIENT REGISTRATION</h1>
            </div>
        </header>
        <div class="main-layout">
    <aside class="sidebar">
        <h3>Menu</h3>
        <ul>
        <li><a href="index.html" class="menu-link">Home</a></li>
        <li><a href="Dashboard.html" class="menu-link">Dashboard</a></li>
        <li class="active"><a href="registration.html" class="menu-link">Patient Registration</a></li>
        <li><a href="management.html" class="menu-link">Patient Management</a></li>
        <li><a href="appointment.html" class="menu-link">Appointment</a></li>
        <li><a href="report.html" class="menu-link">Reports</a></li>
        <li><a href="setting.html" class="menu-link">Settings</a></li>
    </ul>
    </aside>

    <main class="content-area">
        <div class="form-card">
            <h2>New Patient Form</h2>
        
                    
                    <form class="patient-form">
                        <div class="form-grid">
                            <div class="col">
                                <label>Full Name:</label>
                                <input type="text">

                                <label>Age:</label>
                                <input type="number">

                                <label>Gender:</label>
                                <input type="text">
                            </div>

                            <div class="col">
                                <label>Phone Number:</label>
                                <input type="text">

                                <label>National ID:</label>
                                <input type="text">
                            </div>
                        </div>

                        <div class="full-width">
                            <label>Address:</label>
                            <textarea rows="3"></textarea>
                        </div>

                        <div class="form-buttons">
                           <button type="button" id="saveButton" class="btn-save">Save</button>
                            <button type="reset" class="btn-clear">Clear</button>
                          <button type="button" class="btn-print" onclick="window.print()">Print Card</button>
                        </div>
                    </form>
                </div>

                <div class="status-footer">
                    Ready to Register Patient
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
