<h1>CURRENCY CONVERTER</h1>

<div class="converter-box">

<input type="number" id="amount" placeholder="Enter Amount">

<select id="from">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="RWF">RWF</option>
</select>

<select id="to">
<option value="RWF">RWF</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
</select>

<button class="swap-btn" onclick="swapCurrency()">Swap</button>
<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

</div>



<script>
function convert(){

let amount=document.getElementById("amount").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let result=document.getElementById("result");

if(amount==""){
result.innerHTML="Please enter amount";
return;
}

let rates={
USD:1,
EUR:0.92,
GBP:0.79,
RWF:1400
};

let usd=amount/rates[from];
let final=usd*rates[to];

result.innerHTML=amount+" "+from+" = "+final.toFixed(2)+" "+to;
}

function swapCurrency(){
let from=document.getElementById("from");
let to=document.getElementById("to");

let temp=from.value;
from.value=to.value;
to.value=temp;
}
</script>
<script>
window.onload = function(){
let theme = localStorage.getItem("theme");
let brightness = localStorage.getItem("brightness");

if(theme === "dark"){
document.body.classList.add("dark");
}

if(brightness){
document.body.style.filter = "brightness(" + brightness + "%)";
}

if(typeof applyLanguage === 'function'){
applyLanguage();
}
}

function changeTheme(value){
localStorage.setItem("theme", value);
if(value=="dark"){
document.body.classList.add("dark");
}else{
document.body.classList.remove("dark");
}
}
</script>
<script src="css/translations.js" defer></script>
<script>
const rates = {
USD:1,
EUR:0.92,
GBP:0.78,
RWF:1300
};

function convert(){

let amount = document.getElementById("amount").value;
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

let result = (amount / rates[from]) * rates[to];

document.getElementById("result").innerHTML =
amount + " " + from + " = " + result.toFixed(2) + " " + to;

/* Save History */
let history = JSON.parse(localStorage.getItem("history")) || [];

history.push({
amount: amount,
from: from,
to: to,
result: result.toFixed(2),
date: new Date().toLocaleString()
});

localStorage.setItem("history", JSON.stringify(history));

}
</script>
