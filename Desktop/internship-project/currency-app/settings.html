<div class="settings-box">

<h1 id="title">Settings</h1>

<label id="themeText">Choose Theme:</label><br>
<select onchange="changeTheme(this.value)">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>

<br><br>

<label id="brightText">Brightness:</label><br>
<input type="range" min="50" max="150" value="100" onchange="changeBrightness(this.value)">

<br><br>

<label id="langText">Language:</label><br>
<select onchange="changeLanguage(this.value)">
<option value="en">English</option>
<option value="rw">Kinyarwanda</option>
<option value="fr">French</option>
</select>

</div>

<script>
function changeTheme(value){
localStorage.setItem("theme", value);
if(value=="dark"){
document.body.classList.add("dark");
}else{
document.body.classList.remove("dark");
}
}

window.onload = function(){
let theme = localStorage.getItem("theme");
if(theme === "dark"){
document.body.classList.add("dark");
document.querySelector('select[value="dark"]').selected = true;
}
if(typeof applyLanguage === 'function'){
applyLanguage();
}
}

function changeBrightness(value){
document.body.style.filter="brightness("+value+"%)";
}

function changeLanguage(lang){
localStorage.setItem("language", lang);
applyLanguage();
}
</script>
