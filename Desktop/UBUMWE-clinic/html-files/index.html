<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Health Center - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header">
            <div class="logo-container">
                <img src="healthcare-logo.svg" alt="Logo" class="logo">
                <h1>UBUMWE CLINIC - HOME</h1>
            </div>
        </header>

        <div class="body-layout">
            <aside class="sidebar">
                
                
    <h3>Menu</h3>
    <ul>
        <li class="active"><a href="index.html" class="menu-link">Home</a></li>
         <li><a href="Dashboard.html" class="menu-link">Dashboard</a></li>
        <li><a href="registration.html" class="menu-link">Patient Registration</a></li>
         <li><a href="management.html" class="menu-link">Patient Management</a></li>
        <li><a href="appointment.html" class="menu-link">Appointment</a></li>
        <li><a href="report.html" class="menu-link">Reports</a></li>
        <li><a href="setting.html" class="menu-link">Settings</a></li>
    </ul>
</aside>
                

            <main class="main-content">
                <section class="form-section">
                    <h2>Patient Registration</h2>
                    <form id="registrationForm">
                        <input type="text" id="name" placeholder="Name" required>
                        <input type="number" id="age" placeholder="Age" required>
                        <input type="text" id="gender" placeholder="Gender" required>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn-save">Save</button>
                            <button type="reset" class="btn-clear">Clear</button>
                            <button type="button" class="btn-print" onclick="window.print()">Print</button>
                        </div>
                    </form>
                </section>

                <section class="appointments-section">
                    <h3>Appointments Panel</h3>
                    <p class="table-header">Date / Time / Doctor / Status</p>
                    <div id="patientList" class="data-display">
                        </div>
                </section>
            </main>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
